services:
  anki-autofiller:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_RETRIES: ${PIP_RETRIES:-1}
        PIP_TIMEOUT: ${PIP_TIMEOUT:-15}
    image: ghcr.io/eliottflechtner/anki-autofiller:${ANKI_AUTOFILLER_IMAGE_TAG:-latest}
    container_name: anki-autofiller
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      ANKI_AUTOFILLER_FLASK_HOST: 0.0.0.0
      ANKI_AUTOFILLER_FLASK_PORT: 5000
      ANKI_AUTOFILLER_OUTPUT_PATH: ${ANKI_AUTOFILLER_OUTPUT_PATH:-/app/output/anki_import.tsv}
      ANKI_AUTOFILLER_ANKI_URL: ${ANKI_AUTOFILLER_ANKI_URL:-http://host.docker.internal:8765}
      ANKI_AUTOFILLER_PRESET: ${ANKI_AUTOFILLER_PRESET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./output:/app/output
      - ./presets:/app/presets:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
