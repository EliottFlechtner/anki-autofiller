services:
  jisho2anki:
    user: "${UID:-1000}:${GID:-1000}"
    # Use: make build-dev to build locally, or run: DOCKER_BUILDKIT=1 docker build -f config/Dockerfile -t jisho2anki:dev .
    image: jisho2anki:dev
    container_name: jisho2anki-dev
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      ANKI_JISHO2ANKI_FLASK_HOST: 0.0.0.0
      ANKI_JISHO2ANKI_FLASK_PORT: 5000
      ANKI_JISHO2ANKI_OUTPUT_PATH: /app/output/anki_import.tsv
      ANKI_JISHO2ANKI_ANKI_URL: ${ANKI_JISHO2ANKI_ANKI_URL:-http://host.docker.internal:8765}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../:/app
    command: ["python", "-m", "autofiller.web_app"]
