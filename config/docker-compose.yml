services:
  jisho2anki:
    user: "${UID:-1000}:${GID:-1000}"
    image: ghcr.io/eliottflechtner/jisho2anki:${ANKI_JISHO2ANKI_IMAGE_TAG:-latest}
    container_name: jisho2anki
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ANKI_JISHO2ANKI_FLASK_HOST: 0.0.0.0
      ANKI_JISHO2ANKI_FLASK_PORT: 5000
      ANKI_JISHO2ANKI_OUTPUT_PATH: ${ANKI_JISHO2ANKI_OUTPUT_PATH:-/app/output/anki_import.tsv}
      ANKI_JISHO2ANKI_ANKI_URL: ${ANKI_JISHO2ANKI_ANKI_URL:-http://host.docker.internal:8765}
      ANKI_JISHO2ANKI_PRESET: ${ANKI_JISHO2ANKI_PRESET:-}
      ANKI_PITCH_ADDON_DIR: /anki-pitch-addon
    volumes:
      - ../:/app
      - ${HOME}/.local/share/Anki2/addons21/148002038:/anki-pitch-addon:ro
    command: ["python", "-m", "autofiller.web_app"]
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
